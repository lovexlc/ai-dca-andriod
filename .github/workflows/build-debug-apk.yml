name: Build And Release APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      HAS_ANDROID_SIGNING: $ secrets.ANDROID_KEYSTORE_BASE64 != '' && secrets.ANDROID_KEYSTORE_PASSWORD != '' && secrets.ANDROID_KEY_ALIAS != '' && secrets.ANDROID_KEY_PASSWORD != '' 
      ANDROID_VERSION_CODE: $ github.run_number 

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate Gradle Wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Materialize google-services.json
        env:
          GOOGLE_SERVICES_JSON: $ secrets.GOOGLE_SERVICES_JSON 
        run: |
          if [ -z "$GOOGLE_SERVICES_JSON" ]; then
            echo "Missing GOOGLE_SERVICES_JSON secret" >&2
            exit 1
          fi
          printf '%s' "$GOOGLE_SERVICES_JSON" > app/google-services.json

      - name: Materialize release.jks
        if: env.HAS_ANDROID_SIGNING == 'true'
        env:
          ANDROID_KEYSTORE_BASE64: $ secrets.ANDROID_KEYSTORE_BASE64 
        run: |
          printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 -d > release.jks

      - name: Build Debug APK
        run: ./gradlew assembleDebug -PandroidVersionCode=$ github.run_number 

      - name: Build Signed Release APK
        if: env.HAS_ANDROID_SIGNING == 'true'
        env:
          ANDROID_KEYSTORE_PASSWORD: $ secrets.ANDROID_KEYSTORE_PASSWORD 
          ANDROID_KEY_ALIAS: $ secrets.ANDROID_KEY_ALIAS 
          ANDROID_KEY_PASSWORD: $ secrets.ANDROID_KEY_PASSWORD 
        run: ./gradlew assembleRelease -PandroidVersionCode=$ github.run_number 

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk-$ github.run_number 
          path: app/build/outputs/apk/debug/app-debug.apk

      - name: Upload Release APK
        if: env.HAS_ANDROID_SIGNING == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk-$ github.run_number 
          path: app/build/outputs/apk/release/app-release.apk

      - name: Prepare Main Release Metadata
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          BEFORE_SHA: $ github.event.before 
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          RELEASE_TAG="main-build-${GITHUB_RUN_NUMBER}"
          RELEASE_TITLE="Main Build #${GITHUB_RUN_NUMBER}"
          APK_NAME="ai-dca-android-notify-main-${GITHUB_RUN_NUMBER}-${SHORT_SHA}.apk"
          NOTES_FILE="release-notes-main-${GITHUB_RUN_NUMBER}.md"

          if [ "${HAS_ANDROID_SIGNING}" = "true" ] && [ -f app/build/outputs/apk/release/app-release.apk ]; then
            cp app/build/outputs/apk/release/app-release.apk "${APK_NAME}"
          else
            cp app/build/outputs/apk/debug/app-debug.apk "${APK_NAME}"
          fi

          {
            echo "自动构建自 \`main\` 分支推送。"
            echo
            echo "- Commit: \`${GITHUB_SHA}\`"
            echo "- Workflow Run: #${GITHUB_RUN_NUMBER}"
            echo
            echo "## Changelog"
          } > "${NOTES_FILE}"

          if [ -n "${BEFORE_SHA}" ] && [ "${BEFORE_SHA}" != "0000000000000000000000000000000000000000" ]; then
            if git cat-file -e "${BEFORE_SHA}^{commit}" 2>/dev/null; then
              git log --no-merges --pretty=format:'- `%h` %s' "${BEFORE_SHA}..${GITHUB_SHA}" >> "${NOTES_FILE}"
            else
              git log -1 --pretty=format:'- `%h` %s' "${GITHUB_SHA}" >> "${NOTES_FILE}"
            fi
          else
            git log -1 --pretty=format:'- `%h` %s' "${GITHUB_SHA}" >> "${NOTES_FILE}"
          fi

          {
            echo "RELEASE_TAG=${RELEASE_TAG}"
            echo "RELEASE_TITLE=${RELEASE_TITLE}"
            echo "RELEASE_APK_NAME=${APK_NAME}"
            echo "RELEASE_NOTES_FILE=${NOTES_FILE}"
          } >> "${GITHUB_ENV}"

      - name: Create Or Update Main Release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: $ secrets.GITHUB_TOKEN 
        run: |
          if gh release view "${RELEASE_TAG}" >/dev/null 2>&1; then
            gh release upload "${RELEASE_TAG}" "${RELEASE_APK_NAME}" --clobber
            gh release edit "${RELEASE_TAG}" \
              --title "${RELEASE_TITLE}" \
              --notes-file "${RELEASE_NOTES_FILE}"
          else
            gh release create "${RELEASE_TAG}" "${RELEASE_APK_NAME}" \
              --target "${GITHUB_SHA}" \
              --title "${RELEASE_TITLE}" \
              --notes-file "${RELEASE_NOTES_FILE}"
          fi

      - name: Prepare Tag Release APK Name
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          cp app/build/outputs/apk/debug/app-debug.apk "ai-dca-android-notify-${GITHUB_REF_NAME}-debug.apk"
          if [ "${HAS_ANDROID_SIGNING}" = "true" ] && [ -f app/build/outputs/apk/release/app-release.apk ]; then
            cp app/build/outputs/apk/release/app-release.apk "ai-dca-android-notify-${GITHUB_REF_NAME}-release.apk"
          fi

      - name: Create Or Update Release
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: $ secrets.GITHUB_TOKEN 
        run: |
          DEBUG_APK="ai-dca-android-notify-${GITHUB_REF_NAME}-debug.apk"
          RELEASE_APK="ai-dca-android-notify-${GITHUB_REF_NAME}-release.apk"
          ASSETS=("${DEBUG_APK}")
          if [ -f "${RELEASE_APK}" ]; then
            ASSETS+=("${RELEASE_APK}")
          fi
          if gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            gh release upload "${GITHUB_REF_NAME}" "${ASSETS[@]}" --clobber
          else
            gh release create "${GITHUB_REF_NAME}" "${ASSETS[@]}" \
              --target "${GITHUB_SHA}" \
              --title "${GITHUB_REF_NAME}" \
              --generate-notes
          fi
