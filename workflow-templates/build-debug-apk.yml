name: Build And Release APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      HAS_ANDROID_SIGNING: ${{ secrets.ANDROID_KEYSTORE_BASE64 != '' && secrets.ANDROID_KEYSTORE_PASSWORD != '' && secrets.ANDROID_KEY_ALIAS != '' && secrets.ANDROID_KEY_PASSWORD != '' }}
      ANDROID_VERSION_CODE: ${{ github.run_number }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Gradle Wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Materialize google-services.json
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          if [ -z "$GOOGLE_SERVICES_JSON" ]; then
            echo "Missing GOOGLE_SERVICES_JSON secret" >&2
            exit 1
          fi
          printf '%s' "$GOOGLE_SERVICES_JSON" > app/google-services.json

      - name: Materialize release.jks
        if: env.HAS_ANDROID_SIGNING == 'true'
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 -d > release.jks

      - name: Build Debug APK
        run: ./gradlew assembleDebug

      - name: Build Signed Release APK
        if: env.HAS_ANDROID_SIGNING == 'true'
        env:
          ANDROID_VERSION_CODE: ${{ env.ANDROID_VERSION_CODE }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: ./gradlew assembleRelease

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk-${{ github.ref_name }}
          path: app/build/outputs/apk/debug/app-debug.apk

      - name: Upload Release APK
        if: env.HAS_ANDROID_SIGNING == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk-${{ github.ref_name }}
          path: app/build/outputs/apk/release/app-release.apk

      - name: Prepare Release APK Name
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          if [ "${HAS_ANDROID_SIGNING}" = "true" ] && [ -f app/build/outputs/apk/release/app-release.apk ]; then
            cp app/build/outputs/apk/release/app-release.apk "ai-dca-android-notify-${GITHUB_REF_NAME}.apk"
          else
            cp app/build/outputs/apk/debug/app-debug.apk "ai-dca-android-notify-${GITHUB_REF_NAME}.apk"
          fi

      - name: Create Or Update Release
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          APK_NAME="ai-dca-android-notify-${GITHUB_REF_NAME}.apk"
          if gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            gh release upload "${GITHUB_REF_NAME}" "${APK_NAME}" --clobber
          else
            gh release create "${GITHUB_REF_NAME}" "${APK_NAME}" \
              --title "${GITHUB_REF_NAME}" \
              --generate-notes
          fi
